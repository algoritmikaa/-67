<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, touch-action: none">
    <title>AURA HUNTER — Улучшенные способности</title>
    <style>
        :root { --bg: #05051a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); overflow: hidden; font-family: 'Segoe UI', 'Inter', system-ui, sans-serif; height: 100vh; width: 100vw; cursor: none; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
        .ui-overlay { position: fixed; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10; padding: 24px 28px; display: flex; flex-direction: column; gap: 8px; }
        .score-display { display: flex; align-items: baseline; gap: 10px; }
        .score-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.25em; color: rgba(180,200,255,0.7); font-weight: 500; }
        .score-value { font-size: 3rem; font-weight: 900; background: linear-gradient(180deg, #ffffff 0%, #a0d8ff 40%, #7b5fff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 20px rgba(140,120,255,0.8)); letter-spacing: -0.02em; line-height: 1; }
        .aura-meter-container { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
        .aura-meter-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.3em; color: rgba(200,180,255,0.6); font-weight: 600; }
        .aura-meter-bar { width: 140px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 10px; overflow: hidden; }
        .aura-meter-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #00d4ff, #9b59ff, #ff5e9c); transition: width 0.3s ease; box-shadow: 0 0 16px rgba(150,100,255,0.7); width: 0%; }
        .combo-display { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.15em; color: #ffb347; opacity: 0; transition: opacity 0.25s ease, transform 0.25s ease; transform: translateY(5px); text-shadow: 0 0 18px rgba(255,170,50,0.9); }
        .combo-display.active { opacity: 1; transform: translateY(0); }
        .aura-indicator { position: fixed; top: 28px; right: 28px; z-index: 11; pointer-events: none; font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(255,255,255,0.9); background: rgba(10,10,30,0.6); backdrop-filter: blur(12px); padding: 8px 18px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.2); text-shadow: 0 0 14px currentColor; transition: all 0.4s ease; }
        .ability-slot { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 12; pointer-events: none; font-size: 0.85rem; letter-spacing: 0.1em; color: #fff; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); padding: 8px 24px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.25); opacity: 0; transition: opacity 0.25s; }
        .ability-slot.ready { opacity: 1; }
        .hint-text { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; pointer-events: none; font-size: 0.7rem; letter-spacing: 0.2em; color: rgba(180,200,240,0.5); text-align: center; transition: opacity 0.6s ease; }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <div class="score-display"><span class="score-label">Аура</span><span class="score-value" id="scoreText">0</span></div>
        <div class="aura-meter-container"><span class="aura-meter-label">Заряд</span><div class="aura-meter-bar"><div class="aura-meter-fill" id="auraFill"></div></div></div>
        <div class="combo-display" id="comboText">COMBO x1</div>
    </div>
    <div class="aura-indicator" id="auraIndicator">✨ СТАНДАРТНАЯ</div>
    <div class="ability-slot" id="abilitySlot">⚡ Готово (ПКМ)</div>
    <div class="hint-text" id="hintText">двигай курсор • собирай кристаллы и сферы ауры • ПКМ для способности</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreTextEl = document.getElementById('scoreText');
            const auraFillEl = document.getElementById('auraFill');
            const comboTextEl = document.getElementById('comboText');
            const hintTextEl = document.getElementById('hintText');
            const auraIndicatorEl = document.getElementById('auraIndicator');
            const abilitySlotEl = document.getElementById('abilitySlot');

            let W, H, dpr;
            let mouseX = 0, mouseY = 0;
            let targetMouseX = 0, targetMouseY = 0;
            let playerX = 0, playerY = 0;
            let playerTrail = [];
            const MAX_TRAIL = 45;
            let score = 0;
            let displayScore = 0;
            let comboCount = 0;
            let comboTimer = 0;
            const COMBO_WINDOW = 2.2;
            let auraCharge = 100;
            const MAX_AURA_CHARGE = 100;
            let screenShake = 0, shakeX = 0, shakeY = 0;
            let particles = [];
            let collectibles = [];
            let floatingTexts = [];
            let pulseRings = [];
            let time = 0;
            let spawnTimer = 0;
            let spawnInterval = 1.5;
            let difficultyLevel = 1;
            let gameTime = 0;
            let hintOpacity = 1;
            let playerGlowPulse = 0;

            let orbitAngles = [0, Math.PI*0.4, Math.PI*0.8, Math.PI*1.3, Math.PI*1.7, Math.PI*2.1];
            let orbitSpeeds = [1.8, -1.3, 2.1, -1.6, 1.5, -1.9];
            let orbitDistances = [28, 36, 22, 40, 30, 34];
            const PLAYER_BASE_RADIUS = 16;

            const auraThemes = [
                { name: 'СТАНДАРТНАЯ', primary: '#8a6eff', secondary: '#c0aaff', glowInner: 'rgba(180,210,255,0.7)', glowOuter: 'hsla(260, 90%, 65%, 0.35)', trailColor: 'rgba(160,200,255,0.9)', orbitalColor: '#d0d0ff', cursorGlow: 'rgba(200,220,255,0.25)', indicatorColor: '#c0aaff', ability: null },
                { name: 'ОГНЕННАЯ', primary: '#ff4d2e', secondary: '#ffaa33', glowInner: 'rgba(255,200,100,0.8)', glowOuter: 'hsla(15, 95%, 60%, 0.4)', trailColor: 'rgba(255,150,60,0.9)', orbitalColor: '#ffb74d', cursorGlow: 'rgba(255,170,70,0.3)', indicatorColor: '#ffaa33', ability: 'fire' },
                { name: 'ЛЕДЯНАЯ', primary: '#00c8ff', secondary: '#a0f0ff', glowInner: 'rgba(200,250,255,0.85)', glowOuter: 'hsla(195, 100%, 65%, 0.45)', trailColor: 'rgba(150,230,255,0.9)', orbitalColor: '#e0f7ff', cursorGlow: 'rgba(180,240,255,0.35)', indicatorColor: '#a0f0ff', ability: 'ice' },
                { name: 'КОСМИЧЕСКАЯ', primary: '#c840e9', secondary: '#ff66b2', glowInner: 'rgba(255,180,240,0.75)', glowOuter: 'hsla(290, 80%, 65%, 0.4)', trailColor: 'rgba(220,130,255,0.9)', orbitalColor: '#ffb3ff', cursorGlow: 'rgba(230,180,255,0.3)', indicatorColor: '#ff66b2', ability: null },
                { name: '+67 ЗОЛОТАЯ', primary: '#ffd740', secondary: '#fff59d', glowInner: 'rgba(255,240,180,0.9)', glowOuter: 'hsla(45, 100%, 65%, 0.5)', trailColor: 'rgba(255,230,100,0.95)', orbitalColor: '#fff9c4', cursorGlow: 'rgba(255,240,150,0.4)', indicatorColor: '#fff59d', ability: null },
                { name: 'НЕОНОВАЯ', primary: '#39ff14', secondary: '#ff00c8', glowInner: 'rgba(200,255,200,0.8)', glowOuter: 'hsla(120, 100%, 55%, 0.45)', trailColor: 'rgba(100,255,150,0.9)', orbitalColor: '#b2ff59', cursorGlow: 'rgba(180,255,200,0.35)', indicatorColor: '#ff00c8', ability: 'neon' }
            ];

            let currentAuraTheme = auraThemes[0];
            let auraPickups = [];
            let queuedAbility = null;
            let abilityActive = null;
            let abilityTimer = 0;
            const FREEZE_DURATION = 5.0;
            const MAGNET_DURATION = 4.0;
            const MAGNET_FORCE = 450;

            function spawnAuraPickup() {
                const margin = 80;
                const x = margin + Math.random() * (W - margin*2);
                const y = margin + Math.random() * (H - margin*2);
                const availableThemes = auraThemes.filter(t => t.name !== currentAuraTheme.name && t.ability);
                if (availableThemes.length === 0) return;
                const theme = availableThemes[Math.floor(Math.random() * availableThemes.length)];
                auraPickups.push({ x, y, theme, radius: 14, pulse: Math.random()*Math.PI*2, life: 8+Math.random()*5, maxLife: 8+Math.random()*5 });
            }

            function updateAuraIndicator() {
                auraIndicatorEl.textContent = `✨ ${currentAuraTheme.name}`;
                auraIndicatorEl.style.color = currentAuraTheme.indicatorColor;
                auraIndicatorEl.style.textShadow = `0 0 18px ${currentAuraTheme.primary}`;
                auraIndicatorEl.style.borderColor = currentAuraTheme.secondary;
            }

            function applyAuraTheme(theme) {
                currentAuraTheme = theme;
                updateAuraIndicator();
                spawnParticles(playerX, playerY, 30, theme.primary, [60,250], [0.5,1.5], [2,8]);
                spawnPulseRing(playerX, playerY, theme.primary, 140);
                addScreenShake(6);
            }

            function activateAbility(abilityType) {
                if (!abilityType) return;
                abilityActive = null;
                abilityTimer = 0;

                if (abilityType === 'fire') {
                    let totalBurned = 0;
                    const allObjects = [...collectibles, ...auraPickups];
                    allObjects.forEach(obj => {
                        spawnParticles(obj.x, obj.y, 18, '#ff4d2e', [40,180], [0.4,1.2], [2,7]);
                        spawnPulseRing(obj.x, obj.y, '#ff4d2e', 90);
                        totalBurned++;
                    });
                    score += totalBurned * 15;
                    spawnFloatingText(playerX, playerY-20, `🔥 ИСПЕПЕЛЕНИЕ +${totalBurned*15}`, '#ff4d2e', 22);
                    collectibles = [];
                    auraPickups = [];
                    addScreenShake(12);
                } else if (abilityType === 'ice') {
                    abilityActive = 'freeze';
                    abilityTimer = FREEZE_DURATION;
                    spawnFloatingText(playerX, playerY-20, '❄️ ЗАМОРОЗКА', '#00c8ff', 20);
                    addScreenShake(4);
                } else if (abilityType === 'neon') {
                    abilityActive = 'magnet';
                    abilityTimer = MAGNET_DURATION;
                    spawnFloatingText(playerX, playerY-20, '🧲 МАГНИТ', '#39ff14', 20);
                    addScreenShake(4);
                }
                queuedAbility = null;
                updateAbilitySlot();
            }

            function updateAbilitySlot() {
                if (queuedAbility) {
                    abilitySlotEl.textContent = `⚡ ${queuedAbility === 'fire' ? 'Огонь' : queuedAbility === 'ice' ? 'Лёд' : 'Неон'} (ПКМ)`;
                    abilitySlotEl.classList.add('ready');
                } else if (abilityActive) {
                    const sec = Math.ceil(abilityTimer);
                    abilitySlotEl.textContent = `${abilityActive === 'freeze' ? '❄️ Заморозка' : '🧲 Магнит'} ${sec}с`;
                    abilitySlotEl.classList.add('ready');
                } else {
                    abilitySlotEl.classList.remove('ready');
                }
            }

            window.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                if (queuedAbility) {
                    activateAbility(queuedAbility);
                }
            });

            function resize() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(1,0,0,1,0,0);
                ctx.scale(dpr, dpr);
                if (playerX === 0 && playerY === 0) {
                    playerX = W/2; playerY = H/2;
                    mouseX = W/2; mouseY = H/2;
                    targetMouseX = W/2; targetMouseY = H/2;
                }
            }
            window.addEventListener('resize', resize);
            resize();

            playerX = W/2; playerY = H/2;
            mouseX = W/2; mouseY = H/2;
            targetMouseX = W/2; targetMouseY = H/2;

            window.addEventListener('mousemove', (e) => { targetMouseX = e.clientX; targetMouseY = e.clientY; if(hintOpacity>0.05) hintOpacity-=0.03; });
            window.addEventListener('touchmove', (e) => { e.preventDefault(); targetMouseX = e.touches[0].clientX; targetMouseY = e.touches[0].clientY; if(hintOpacity>0.05) hintOpacity-=0.03; }, {passive: false});
            window.addEventListener('touchstart', (e) => { targetMouseX = e.touches[0].clientX; targetMouseY = e.touches[0].clientY; if(hintOpacity>0.05) hintOpacity-=0.03; });
            window.addEventListener('click', () => { if(hintOpacity>0.05) hintOpacity-=0.15; });

            function spawnParticles(x,y,count,colorBase,speedRange,lifeRange,sizeRange) {
                for(let i=0;i<count;i++) {
                    const angle = Math.random()*Math.PI*2;
                    const speed = speedRange[0]+Math.random()*(speedRange[1]-speedRange[0]);
                    const life = lifeRange[0]+Math.random()*(lifeRange[1]-lifeRange[0]);
                    const size = sizeRange[0]+Math.random()*(sizeRange[1]-sizeRange[0]);
                    particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life,maxLife:life,size,color:colorBase,type:'spark'});
                }
            }

            function spawnFloatingText(x,y,text,color,size) {
                floatingTexts.push({x,y,text,life:1.8,maxLife:1.8,color,size,vy:-60-Math.random()*80});
            }

            function spawnPulseRing(x,y,color,maxRadius) {
                pulseRings.push({x,y,radius:4,maxRadius,life:0.7,maxLife:0.7,color});
            }

            function createCollectible(x,y,type) {
                let value,color,size,rarity;
                if(type==='golden') { value=67; color='#ffd740'; size=15; rarity='golden'; }
                else if(type==='epic') { value=100; color='#e040ff'; size=18; rarity='epic'; }
                else { value=10; color='#00e0ff'; size=11; rarity='common'; }
                return {x,y,value,color,size,rarity,life:5+Math.random()*7,maxLife:5+Math.random()*7,pulse:Math.random()*Math.PI*2,sparkTimer:0,glowPhase:Math.random()*Math.PI*2};
            }

            function spawnCollectible() {
                const margin=60;
                const x=margin+Math.random()*(W-margin*2);
                const y=margin+Math.random()*(H-margin*2);
                const roll=Math.random();
                let type='common';
                if(roll<0.06) type='epic';
                else if(roll<0.18) type='golden';
                collectibles.push(createCollectible(x,y,type));
            }

            function addScreenShake(intensity) { screenShake = Math.max(screenShake, intensity); }

            function collectItem(item) {
                const isGolden = item.rarity==='golden';
                const isEpic = item.rarity==='epic';
                const baseVal = item.value;
                const comboMultiplier = Math.min(comboCount+1,10);
                const finalVal = baseVal * comboMultiplier;
                score += finalVal;
                comboCount++;
                comboTimer = COMBO_WINDOW;
                auraCharge = Math.min(MAX_AURA_CHARGE, auraCharge + (isEpic?25:isGolden?16:8));
                spawnParticles(item.x,item.y, isEpic?50:isGolden?35:20, item.color, [80,350],[0.5,1.8],[1.5,6]);
                spawnPulseRing(item.x,item.y,item.color, isEpic?180:isGolden?130:90);
                let txt = '+'+finalVal;
                if(isGolden) txt='+67 АУРА ✦';
                if(isEpic) txt='+100 ЭПИК ⚡';
                if(comboCount>=5) txt+=' x'+comboMultiplier;
                spawnFloatingText(item.x,item.y-10,txt,item.color,isEpic?26:isGolden?22:16);
                addScreenShake(isEpic?14:isGolden?9:4);
                const idx = collectibles.indexOf(item);
                if(idx>-1) collectibles.splice(idx,1);
                if(isGolden||isEpic) spawnParticles(item.x,item.y,15,'#ffffff',[30,160],[0.3,1.0],[1,3]);
            }

            function collectAuraPickup(pickup) {
                applyAuraTheme(pickup.theme);
                spawnFloatingText(pickup.x, pickup.y-10, 'АУРА: '+pickup.theme.name, pickup.theme.primary, 20);
                if (pickup.theme.ability) {
                    queuedAbility = pickup.theme.ability;
                    updateAbilitySlot();
                }
                const idx = auraPickups.indexOf(pickup);
                if(idx>-1) auraPickups.splice(idx,1);
            }

            function updateParticles(dt) {
                for(let i=particles.length-1;i>=0;i--) {
                    const p=particles[i];
                    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
                    if(p.life<=0) particles.splice(i,1);
                }
            }

            function updateFloatingTexts(dt) {
                for(let i=floatingTexts.length-1;i>=0;i--) {
                    const ft=floatingTexts[i];
                    ft.y+=ft.vy*dt; ft.life-=dt;
                    if(ft.life<=0) floatingTexts.splice(i,1);
                }
            }

            function updatePulseRings(dt) {
                for(let i=pulseRings.length-1;i>=0;i--) {
                    const pr=pulseRings[i];
                    pr.life-=dt;
                    pr.radius+=(pr.maxRadius-pr.radius)*8*dt;
                    if(pr.life<=0) pulseRings.splice(i,1);
                }
            }

            function updateCollectibles(dt) {
                const freeze = abilityActive === 'freeze';
                for(let i=collectibles.length-1;i>=0;i--) {
                    const c=collectibles[i];
                    if(!freeze) c.life -= dt;
                    c.pulse += dt*3;
                    c.glowPhase += dt*2.5;
                    c.sparkTimer -= dt;
                    if(c.sparkTimer<=0 && c.rarity==='golden') {
                        c.sparkTimer=0.25+Math.random()*0.4;
                        spawnParticles(c.x+(Math.random()-0.5)*20, c.y+(Math.random()-0.5)*20,2,'#fffbe6',[10,40],[0.2,0.5],[0.8,2]);
                    }
                    if(c.life<=0) {
                        spawnParticles(c.x,c.y,6,c.color,[20,70],[0.2,0.6],[1,3]);
                        collectibles.splice(i,1);
                    }
                }
                for(let i=auraPickups.length-1;i>=0;i--) {
                    const ap=auraPickups[i];
                    if(!freeze) ap.life -= dt;
                    ap.pulse += dt*2.5;
                    if(ap.life<=0) auraPickups.splice(i,1);
                }
            }

            function applyMagnet(dt) {
                if(abilityActive !== 'magnet') return;
                const objects = [...collectibles, ...auraPickups];
                for(let obj of objects) {
                    const dx = playerX - obj.x;
                    const dy = playerY - obj.y;
                    const dist = Math.sqrt(dx*dx+dy*dy);
                    if(dist > 15) {
                        const force = MAGNET_FORCE / (dist * 0.4);
                        obj.x += (dx/dist) * force * dt;
                        obj.y += (dy/dist) * force * dt;
                    }
                }
            }

            function drawBackground() {
                const grad = ctx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.5,Math.max(W,H)*0.9);
                grad.addColorStop(0,'#0d0d30'); grad.addColorStop(0.5,'#080820'); grad.addColorStop(1,'#020210');
                ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
                ctx.strokeStyle='rgba(60,80,140,0.06)'; ctx.lineWidth=0.5;
                for(let x=60;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
                for(let y=60;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
                [{x:W*0.25,y:H*0.3,r:280,c:'rgba(80,30,140,0.04)'},{x:W*0.7,y:H*0.6,r:350,c:'rgba(20,60,160,0.04)'},{x:W*0.5,y:H*0.75,r:400,c:'rgba(100,20,100,0.03)'},{x:W*0.15,y:H*0.7,r:250,c:'rgba(20,100,140,0.03)'}].forEach(n=>{const ng=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);ng.addColorStop(0,n.c);ng.addColorStop(1,'transparent');ctx.fillStyle=ng;ctx.fillRect(n.x-n.r,n.y-n.r,n.r*2,n.r*2);});
                for(let i=0;i<180;i++){const sx=((i*137.508+42)*7919)%W;const sy=((i*251.731+42)*6271)%H;const twinkle=0.3+0.7*Math.abs(Math.sin(time*1.7+i*0.7));ctx.fillStyle=`rgba(200,220,255,${0.25+twinkle*0.55})`;ctx.beginPath();ctx.arc(sx,sy,0.4+twinkle*1.2,0,Math.PI*2);ctx.fill();}
                if(abilityActive==='freeze'){ctx.fillStyle='rgba(0,200,255,0.08)';ctx.fillRect(0,0,W,H);}
            }

            function drawPlayerGlow(x,y,auraLevel) {
                const theme=currentAuraTheme;
                const og=ctx.createRadialGradient(x,y,PLAYER_BASE_RADIUS*0.8,x,y,90+auraLevel*30);
                og.addColorStop(0,theme.glowOuter); og.addColorStop(0.4,theme.glowOuter.replace('0.35','0.15')); og.addColorStop(0.7,'rgba(20,20,50,0.04)'); og.addColorStop(1,'transparent');
                ctx.fillStyle=og; ctx.beginPath(); ctx.arc(x,y,90+auraLevel*30,0,Math.PI*2); ctx.fill();
                const mg=ctx.createRadialGradient(x,y,PLAYER_BASE_RADIUS*0.3,x,y,40+auraLevel*15);
                mg.addColorStop(0,theme.glowInner); mg.addColorStop(0.5,'rgba(120,150,240,0.35)'); mg.addColorStop(1,'transparent');
                ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(x,y,40+auraLevel*15,0,Math.PI*2); ctx.fill();
                const cg=ctx.createRadialGradient(x,y,0,x,y,PLAYER_BASE_RADIUS+auraLevel*4);
                cg.addColorStop(0,'rgba(255,255,255,1)'); cg.addColorStop(0.25,'rgba(240,245,255,0.9)'); cg.addColorStop(0.6,theme.primary); cg.addColorStop(1,'transparent');
                ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(x,y,PLAYER_BASE_RADIUS+auraLevel*4,0,Math.PI*2); ctx.fill();
            }

            function drawPlayerTrail() {
                if(playerTrail.length<2)return;
                for(let i=0;i<playerTrail.length;i++){const t=playerTrail[i];const alpha=(i/playerTrail.length)*0.45;const size=3+(i/playerTrail.length)*14;const grad=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,size);grad.addColorStop(0,currentAuraTheme.trailColor.replace('0.9',alpha));grad.addColorStop(0.6,`rgba(100,140,240,${alpha*0.5})`);grad.addColorStop(1,'transparent');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(t.x,t.y,size,0,Math.PI*2);ctx.fill();}
            }

            function drawPlayerOrbitals(x,y,auraLevel) {
                for(let i=0;i<orbitAngles.length;i++){orbitAngles[i]+=orbitSpeeds[i]*0.025;const ox=x+Math.cos(orbitAngles[i])*orbitDistances[i]*(1+auraLevel*0.3);const oy=y+Math.sin(orbitAngles[i])*orbitDistances[i]*(1+auraLevel*0.3);const oAlpha=0.6+auraLevel*0.25;const oSize=1.5+auraLevel*1.2;const og=ctx.createRadialGradient(ox,oy,0,ox,oy,oSize*3);og.addColorStop(0,`rgba(255,255,255,${oAlpha})`);og.addColorStop(0.4,currentAuraTheme.orbitalColor.replace(')',`,${oAlpha*0.5})`).replace('rgb','rgba'));og.addColorStop(1,'transparent');ctx.fillStyle=og;ctx.beginPath();ctx.arc(ox,oy,oSize*3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(ox,oy,oSize,0,Math.PI*2);ctx.fill();}
            }

            function drawCollectible(c){const alpha=Math.min(1,c.life/1.5);const ps=1+Math.sin(c.pulse)*0.2;const size=c.size*ps;const x=c.x,y=c.y;const og=ctx.createRadialGradient(x,y,size*0.3,x,y,size*2.5);og.addColorStop(0,c.color.replace(')',`,${0.5*alpha})`).replace('rgb','rgba'));og.addColorStop(0.5,c.color.replace(')',`,${0.2*alpha})`).replace('rgb','rgba'));og.addColorStop(1,'transparent');ctx.fillStyle=og;ctx.beginPath();ctx.arc(x,y,size*2.5,0,Math.PI*2);ctx.fill();ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=c.color;ctx.shadowColor=c.color;ctx.shadowBlur=size*1.5;const cl=size*2.2,ct=size*0.35;ctx.beginPath();ctx.roundRect(x-ct,y-cl,ct*2,cl*2,ct);ctx.fill();ctx.beginPath();ctx.roundRect(x-cl,y-ct,cl*2,ct*2,ct);ctx.fill();ctx.shadowBlur=0;ctx.restore();const cg=ctx.createRadialGradient(x,y,0,x,y,size*0.8);cg.addColorStop(0,`rgba(255,255,255,${alpha})`);cg.addColorStop(0.4,c.color.replace(')',`,${0.8*alpha})`).replace('rgb','rgba'));cg.addColorStop(1,'transparent');ctx.fillStyle=cg;ctx.beginPath();ctx.arc(x,y,size*0.8,0,Math.PI*2);ctx.fill();}

            function drawAuraPickup(ap){const alpha=Math.min(1,ap.life/2);const ps=1+Math.sin(ap.pulse)*0.25;const r=ap.radius*ps;const x=ap.x,y=ap.y;const theme=ap.theme;const og=ctx.createRadialGradient(x,y,r*0.2,x,y,r*2.2);og.addColorStop(0,theme.primary);og.addColorStop(0.6,theme.secondary+'80');og.addColorStop(1,'transparent');ctx.fillStyle=og;ctx.beginPath();ctx.arc(x,y,r*2.2,0,Math.PI*2);ctx.fill();const ig=ctx.createRadialGradient(x,y,0,x,y,r);ig.addColorStop(0,'#ffffff');ig.addColorStop(0.3,theme.secondary);ig.addColorStop(1,theme.primary);ctx.fillStyle=ig;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle='#ffffff';ctx.shadowColor='#ffffff';ctx.shadowBlur=12;ctx.font=`${r*1.2}px "Segoe UI"`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('✨',x,y);ctx.shadowBlur=0;ctx.restore();}

            function drawPulseRingsList(){pulseRings.forEach(pr=>{const alpha=(pr.life/pr.maxLife)*0.6;ctx.strokeStyle=pr.color.replace(')',`,${alpha})`).replace('rgb','rgba');ctx.lineWidth=2*(pr.life/pr.maxLife);ctx.beginPath();ctx.arc(pr.x,pr.y,pr.radius,0,Math.PI*2);ctx.stroke();});}
            function drawFloatingTextsList(){floatingTexts.forEach(ft=>{const alpha=Math.min(1,ft.life/0.6);const scale=1+(1-ft.life/ft.maxLife)*0.4;ctx.save();ctx.globalAlpha=alpha;ctx.font=`900 ${ft.size*scale}px "Segoe UI"`;ctx.textAlign='center';ctx.fillStyle=ft.color;ctx.shadowColor=ft.color;ctx.shadowBlur=20;ctx.fillText(ft.text,ft.x,ft.y);ctx.shadowBlur=0;ctx.fillStyle='#ffffff';ctx.shadowColor='#ffffff';ctx.shadowBlur=8;ctx.fillText(ft.text,ft.x,ft.y);ctx.shadowBlur=0;ctx.restore();});}
            function drawVignette(){const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.55,W/2,H/2,Math.max(W,H)*0.8);vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,8,0.55)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);}

            function update(dt){
                const clampedDt = Math.min(dt,0.1);
                time+=clampedDt; gameTime+=clampedDt;
                mouseX+=(targetMouseX-mouseX)*12*clampedDt; mouseY+=(targetMouseY-mouseY)*12*clampedDt;
                playerX+=(mouseX-playerX)*18*clampedDt; playerY+=(mouseY-playerY)*18*clampedDt;
                const dx=playerX-(playerTrail.length>0?playerTrail[playerTrail.length-1].x:playerX);
                const dy=playerY-(playerTrail.length>0?playerTrail[playerTrail.length-1].y:playerY);
                if(Math.sqrt(dx*dx+dy*dy)>1.5) playerTrail.push({x:playerX,y:playerY});
                while(playerTrail.length>MAX_TRAIL) playerTrail.shift();
                auraCharge-=2.5*clampedDt; if(auraCharge<0) auraCharge=0;
                const auraLevel=auraCharge/MAX_AURA_CHARGE;
                playerGlowPulse+=clampedDt*4;
                const currentPlayerRadius=PLAYER_BASE_RADIUS+auraLevel*6+Math.sin(playerGlowPulse)*2;
                if(comboTimer>0){comboTimer-=clampedDt; if(comboTimer<=0){comboCount=0;comboTimer=0;}}
                if(screenShake>0){shakeX=(Math.random()-0.5)*screenShake*2;shakeY=(Math.random()-0.5)*screenShake*2;screenShake-=clampedDt*18;if(screenShake<0){screenShake=0;shakeX=0;shakeY=0;}}
                if(abilityActive){abilityTimer-=clampedDt; if(abilityTimer<=0){abilityActive=null;abilityTimer=0;} updateAbilitySlot();}
                applyMagnet(clampedDt);
                spawnTimer-=clampedDt;
                if(spawnTimer<=0){spawnTimer=spawnInterval+Math.random()*1.2;spawnCollectible();if(Math.random()<0.35)spawnCollectible();if(Math.random()<0.15 && auraPickups.length<3)spawnAuraPickup();}
                difficultyLevel=1+Math.floor(gameTime/35); spawnInterval=Math.max(0.35,1.5-difficultyLevel*0.12);
                if(collectibles.length>25){const toRemove=collectibles.length-25;for(let i=0;i<toRemove;i++)if(collectibles[i])spawnParticles(collectibles[i].x,collectibles[i].y,4,collectibles[i].color,[15,50],[0.2,0.5],[1,2.5]);collectibles.splice(0,toRemove);}
                updateParticles(clampedDt); updateFloatingTexts(clampedDt); updatePulseRings(clampedDt); updateCollectibles(clampedDt);
                for(let i=collectibles.length-1;i>=0;i--){const c=collectibles[i];if(Math.hypot(playerX-c.x,playerY-c.y)<currentPlayerRadius+c.size+10)collectItem(c);}
                for(let i=auraPickups.length-1;i>=0;i--){const ap=auraPickups[i];if(Math.hypot(playerX-ap.x,playerY-ap.y)<currentPlayerRadius+ap.radius+8)collectAuraPickup(ap);}
                displayScore+=(score-displayScore)*10*clampedDt; if(Math.abs(score-displayScore)<0.5)displayScore=score;
                scoreTextEl.textContent=Math.floor(displayScore).toLocaleString();
                auraFillEl.style.width=(auraCharge/MAX_AURA_CHARGE*100)+'%';
                if(comboCount>=2){comboTextEl.textContent='COMBO x'+Math.min(comboCount+1,10);comboTextEl.classList.add('active');}else if(comboCount<=1&&comboTimer<=0)comboTextEl.classList.remove('active');
                if(comboCount>=5){comboTextEl.style.color='#ff5e9c';comboTextEl.style.textShadow='0 0 22px rgba(255,90,150,0.95)';}else if(comboCount>=3){comboTextEl.style.color='#ffb347';comboTextEl.style.textShadow='0 0 18px rgba(255,170,50,0.9)';}else{comboTextEl.style.color='#ffd740';comboTextEl.style.textShadow='0 0 14px rgba(255,210,60,0.7)';}
                hintTextEl.style.opacity=hintOpacity>0.001?hintOpacity:'0';
            }

            function draw(){
                ctx.clearRect(0,0,W,H); ctx.save(); ctx.translate(shakeX,shakeY);
                drawBackground(); drawPlayerTrail(); drawPulseRingsList();
                collectibles.forEach(c=>drawCollectible(c)); auraPickups.forEach(ap=>drawAuraPickup(ap));
                const auraLevel=auraCharge/MAX_AURA_CHARGE; drawPlayerGlow(playerX,playerY,auraLevel); drawPlayerOrbitals(playerX,playerY,auraLevel);
                particles.forEach(p=>{const alpha=p.life/p.maxLife;const grad=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);grad.addColorStop(0,p.color.replace(')',`,${alpha})`).replace('rgb','rgba'));grad.addColorStop(1,'transparent');ctx.fillStyle=grad;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});
                drawFloatingTextsList(); ctx.restore(); drawVignette();
                const cg=ctx.createRadialGradient(mouseX,mouseY,0,mouseX,mouseY,22);cg.addColorStop(0,currentAuraTheme.cursorGlow);cg.addColorStop(0.5,'rgba(140,170,240,0.08)');cg.addColorStop(1,'transparent');ctx.fillStyle=cg;ctx.beginPath();ctx.arc(mouseX,mouseY,22,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='rgba(255,255,255,0.7)';ctx.beginPath();ctx.arc(mouseX,mouseY,2.5,0,Math.PI*2);ctx.fill();
                ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(mouseX,mouseY,8,0,Math.PI*2);ctx.stroke();
            }

            function gameLoop(timestamp){
                const dt=Math.min(0.1,(timestamp-lastTimestamp)/1000); lastTimestamp=timestamp;
                update(dt); draw(); requestAnimationFrame(gameLoop);
            }

            let lastTimestamp=performance.now();
            for(let i=0;i<8;i++){const m=70;collectibles.push(createCollectible(m+Math.random()*(W-m*2),m+Math.random()*(H-m*2),Math.random()<0.12?'golden':'common'));}
            spawnTimer=1.2; updateAuraIndicator();
            requestAnimationFrame(gameLoop);
            console.log('%c✨ AURA HUNTER %cспособности усилены %c+67','font-size:1.4em;color:#c8a0ff;','font-size:1em;color:#aaa;','font-size:1.2em;color:#ffd740;font-weight:bold;');
        })();
    </script>
